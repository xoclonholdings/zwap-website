<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZWAP! Request Received</title>

  <style>
    body {
      min-height: 100vh;
      margin: 0;
      padding: 40px 20px;
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
      text-align: center;
      background:
        radial-gradient(circle at 50% 12%, rgba(34, 211, 238, 0.22), transparent 34%),
        linear-gradient(180deg, #070b19 0%, #050814 52%, #02030a 100%);
    }

    .card {
      width: 100%;
      max-width: 560px;
      margin: 90px auto 0;
      border: 1px solid rgba(34, 211, 238, 0.24);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.055);
      padding: 28px;
      box-shadow: 0 0 36px rgba(34, 211, 238, 0.12);
    }

    h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1;
      letter-spacing: -0.06em;
      background: linear-gradient(90deg, #22d3ee, #c084fc, #f472b6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      margin: 18px auto 0;
      max-width: 460px;
      color: rgba(255, 255, 255, 0.68);
      line-height: 1.6;
      font-size: 15px;
    }

    a {
      display: inline-flex;
      margin-top: 24px;
      border: 1px solid rgba(34, 211, 238, 0.58);
      border-radius: 999px;
      padding: 12px 18px;
      color: #dffbff;
      text-decoration: none;
      font-weight: 900;
      background: rgba(34, 211, 238, 0.14);
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>Request Received</h1>
    <p>
      Your ZWAP! account and data deletion request has been submitted.
      Requests are reviewed and processed within 7 days.
    </p>
    <a href="/">Return to ZWAP!</a>
  </main>
</body>
</html>
